server.port=8081
server.address=0.0.0.0

# Production Database Configuration (MySQL or PostgreSQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/login_db
# spring.datasource.username=your_db_username
# spring.datasource.password=your_db_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For now, keep H2 for simplicity
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT Configuration
JWT_SECRET=mySuperSecretKeyForJWTTokenGenerationThatIsLongEnoughToMeetTheRequirements
JWT_EXPIRATION=86400000

# CORS Configuration for production
# spring.web.cors.allowed-origins=http://yourdomain.com
